name: Build All Languages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------- 1. 安装编译器和依赖 -------------------
      - name: Install compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ mono-complete default-jdk-headless golang-go

          # Rust
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

          # Swift
          sudo apt-get install -y clang libicu-dev
          wget https://download.swift.org/swift-5.9.1-release/ubuntu2204/swift-5.9.1-RELEASE/swift-5.9.1-RELEASE-ubuntu22.04.tar.gz
          tar xzf swift-*.tar.gz
          sudo mkdir -p /opt/swift
          sudo mv swift-*/* /opt/swift/ 2>/dev/null || sudo mv swift-* /opt/swift/
          echo "/opt/swift/usr/bin" >> $GITHUB_PATH

          # Kotlin
          curl -s https://get.sdkman.io | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install kotlin
          echo "$HOME/.sdkman/candidates/kotlin/current/bin" >> $GITHUB_PATH

      # ------------------- 2. 编译各语言（使用点开头的源文件） -------------------
      - name: Build executables
        run: |
          export PATH="$HOME/.cargo/bin:/opt/swift/usr/bin:$HOME/.sdkman/candidates/kotlin/current/bin:$PATH"

          gcc -o C.exe .c
          g++ -o Cpp.exe .cpp
          mcs -out:CSharp.exe .cs
          javac .java && jar cfe Java.jar Java .class
          go build -o Go.exe .go
          rustc .rs -o Rust.exe
          swiftc -o Swift.exe .swift
          kotlinc .kt -include-runtime -d Kotlin.jar
          vbnc /out:VisualBasic.exe .vb

      # ------------------- 3. 收集所有文件 -------------------
      - name: Collect artifacts
        run: |
          mkdir -p artifacts

          # 编译产物
          cp C.exe Cpp.exe CSharp.exe Java.jar Go.exe Rust.exe Swift.exe Kotlin.jar VisualBasic.exe artifacts/ 2>/dev/null || true

          # 解释型源文件（点开头）
          cp .py .js .ts .php .rb .lua .sh .html artifacts/ 2>/dev/null || true

          # 额外脚本文件（.command, .bat, .cmd）
          cp .command .bat .cmd artifacts/ 2>/dev/null || true

          # Scratch 项目
          cp .sb3 artifacts/ 2>/dev/null || true

          ls -la artifacts/

      # ------------------- 4. 发布 Release（不可见字符） -------------------
      - name: Publish release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "‭"
          draft: false
          prerelease: false
          name: "‭"
          body: "‭"
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}