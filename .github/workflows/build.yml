name: Build All Languages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------- 1. 创建缺失的源文件（点开头） -------------------
      - name: Ensure source files exist
        run: |
          # 辅助函数：如果文件不存在则创建
          create_if_missing() {
            local file="$1"
            local content="$2"
            if [ ! -f "$file" ]; then
              echo "$content" > "$file"
              echo "Created $file"
            else
              echo "File $file already exists, keeping it"
            fi
          }

          # 编译型语言源文件（点开头）
          create_if_missing ".c" '#include <stdio.h>\nint main() { const char* GunMu = " "; printf("\"%s\"\n", GunMu); return 0; }'
          create_if_missing ".cpp" '#include <iostream>\nusing namespace std;\nint main() { const char* GunMu = " "; cout << "\"" << GunMu << "\"" << endl; return 0; }'
          create_if_missing ".cs" 'using System;\nclass Program { static void Main() { string GunMu = " "; Console.WriteLine($"\"{GunMu}\""); } }'
          create_if_missing ".java" 'public class Java { public static void main(String[] args) { String GunMu = " "; System.out.println("\"" + GunMu + "\""); } }'
          create_if_missing ".go" 'package main\nimport "fmt"\nfunc main() { GunMu := " "; fmt.Printf("\"%s\"\n", GunMu) }'
          create_if_missing ".rs" 'fn main() { let GunMu = " "; println!("\"{}\"", GunMu); }'
          create_if_missing ".swift" 'let GunMu = " "; print("\"\(GunMu)\"")'
          create_if_missing ".kt" 'fun main() { val GunMu = " "; println("\"$GunMu\"") }'
          create_if_missing ".vb" 'Module GunMu\n    Sub Main()\n        Dim GunMu As String = " "\n        Console.WriteLine($"""{GunMu}""")\n    End Sub\nEnd Module'

          # 解释型语言源文件（点开头）—— 如果不存在也创建
          create_if_missing ".py" 'GunMu = " "\nprint(f"\"{GunMu}\"")'
          create_if_missing ".js" 'const GunMu = " ";\nconsole.log(`"${GunMu}"`);'
          create_if_missing ".ts" 'const GunMu: string = " ";\nconsole.log(`"${GunMu}"`);'
          create_if_missing ".php" '<?php\n$GunMu = " ";\necho "\"$GunMu\"\n";\n?>'
          create_if_missing ".rb" 'GunMu = " "\nputs "\"#{GunMu}\""'
          create_if_missing ".lua" 'local GunMu = " "\nprint("\"" .. GunMu .. "\"")'
          create_if_missing ".sh" '#!/bin/bash\nGunMu=" "\necho "\"$GunMu\""'
          create_if_missing ".html" '<!DOCTYPE html>\n<html>\n<head><meta charset="UTF-8"><title> </title></head>\n<body>\n<script>\nconst GunMu = " ";\ndocument.write(\'"\' + GunMu + \'"\');\n</script>\n</body>\n</html>'

          # .sb3 文件不会创建，如果不存在则跳过

      # ------------------- 2. 安装编译器和依赖 -------------------
      - name: Install compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ mono-complete default-jdk-headless golang-go

          # Rust
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

          # Swift
          sudo apt-get install -y clang libicu-dev
          wget https://download.swift.org/swift-5.9.1-release/ubuntu2204/swift-5.9.1-RELEASE/swift-5.9.1-RELEASE-ubuntu22.04.tar.gz
          tar xzf swift-*.tar.gz
          sudo mkdir -p /opt/swift
          sudo mv swift-*/* /opt/swift/ 2>/dev/null || sudo mv swift-* /opt/swift/
          echo "/opt/swift/usr/bin" >> $GITHUB_PATH

          # Kotlin
          curl -s https://get.sdkman.io | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install kotlin
          echo "$HOME/.sdkman/candidates/kotlin/current/bin" >> $GITHUB_PATH

      # ------------------- 3. 编译各语言（使用点开头的源文件） -------------------
      - name: Build executables
        run: |
          export PATH="$HOME/.cargo/bin:/opt/swift/usr/bin:$HOME/.sdkman/candidates/kotlin/current/bin:$PATH"

          gcc -o C.exe .c
          g++ -o Cpp.exe .cpp
          mcs -out:CSharp.exe .cs
          javac .java && jar cfe Java.jar Java .class
          go build -o Go.exe .go
          rustc .rs -o Rust.exe
          swiftc -o Swift.exe .swift
          kotlinc .kt -include-runtime -d Kotlin.jar
          vbnc /out:VisualBasic.exe .vb

      # ------------------- 4. 收集所有文件 -------------------
      - name: Collect artifacts
        run: |
          mkdir -p artifacts

          # 编译产物（带语言名）
          cp C.exe Cpp.exe CSharp.exe Java.jar Go.exe Rust.exe Swift.exe Kotlin.jar VisualBasic.exe artifacts/ 2>/dev/null || true

          # 解释型源文件（点开头）
          cp .py .js .ts .php .rb .lua .sh .html artifacts/ 2>/dev/null || true

          # Scratch 项目（如果有）
          cp .sb3 artifacts/ 2>/dev/null || true

          ls -la artifacts/

      # ------------------- 5. 发布 Release（不可见字符） -------------------
      - name: Publish release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "‭"
          draft: false
          prerelease: false
          name: "‭"
          body: "‭"
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}